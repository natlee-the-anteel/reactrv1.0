name: Test Linux Install

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-setup:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run setup.sh
        run: bash setup.sh

      - name: Verify key binaries are on PATH
        run: |
          export PATH="$GITHUB_WORKSPACE/bin:$GITHUB_WORKSPACE/preset:$PATH"
          which snakemake
          which diamond
          which iqtree
          which meme
          which preset/MCScanX || echo "MCScanX check path may need adjustment"
